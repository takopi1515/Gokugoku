workflows:
  ios-workflow:
    name: DRINK LAMP iOS
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Unzip PWABuilder package
        script: |
          find . -name "*.zip" | head -1 | xargs unzip -o
      - name: Install dependencies
        script: |
          find . -name "Podfile" | head -1 | xargs -I{} sh -c 'cd $(dirname {}) && pod install'
      - name: Build iOS
        script: |
          XCODE_PROJECT=$(find . -name "*.xcworkspace" | head -1)
          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$(xcodebuild -list -workspace "$XCODE_PROJECT" | grep -A1 'Schemes:' | tail -1 | tr -d ' ')" \
            -configuration Release \
            -archivePath build/DRINK_LAMP.xcarchive \
            archive
    artifacts:
      - build/DRINK_LAMP.xcarchive
